<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>choi-draw</title>
    <style>
        body { background-color: #008080; font-family: 'Courier New', Courier, monospace; font-size: 13px; padding: 10px; color: #000; }
        .window { background-color: #c0c0c0; border: 2px solid #000; padding: 2px; width: 100%; max-width: 600px; margin: auto; }
        .title-bar { background: #000080; color: #fff; padding: 3px 5px; font-weight: bold; margin-bottom: 2px; }
        .panel { border: 2px solid #000; background-color: #c0c0c0; padding: 8px; margin-bottom: 10px; box-shadow: inset 2px 2px #fff, inset -2px -2px #808080; }
        button { background-color: #c0c0c0; border: 2px solid #000; padding: 4px 8px; cursor: pointer; font-weight: bold; box-shadow: 2px 2px #fff, -2px -2px #808080; }
        button:active { box-shadow: inset 2px 2px #000; }
        #canvas-wrapper { position: relative; border: 2px solid #000; background-color: #808080; width: 100%; overflow: hidden; min-height: 100px; }
        .layer { position: absolute; top: 0; left: 0; width: 100%; display: block; touch-action: none; }
        input { border: 2px solid #000; box-shadow: inset 2px 2px #808080; padding: 2px; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">choi-draw.exe</div>
    <div class="content" style="padding: 10px;">
        <div class="panel">
            <input type="text" id="textInput" placeholder="文字..." style="width: 80%;"><br><br>
            色: <input type="color" id="colorPicker" value="#ff0000" style="width: 40px; height: 20px;">
            <input type="file" id="fileInput" accept="image/*" style="font-size: 10px;">
        </div>
        
        <div style="margin-bottom: 10px;">
            <button onclick="setMode('text')">文字</button>
            <button onclick="setMode('arrow')">矢印</button>
            <button onclick="undo()">戻る</button>
            <button onclick="showSavePreview()">保存</button>
        </div>

        <div id="canvas-wrapper">
            <canvas id="baseLayer" class="layer"></canvas>
            <canvas id="frontLayer" class="layer"></canvas>
        </div>

        <div id="saveArea" style="display:none; margin-top:10px;">
            <canvas id="previewCanvas" style="width:100%; border: 2px solid #000;"></canvas>
            <button onclick="openInNewTab()" style="width:100%; margin-top:5px;">別タブ</button>
        </div>
    </div>
</div>

<script>
    const baseLayer = document.getElementById('baseLayer'), frontLayer = document.getElementById('frontLayer');
    const previewCanvas = document.getElementById('previewCanvas'), colorPicker = document.getElementById('colorPicker');
    
    // 画像ファイルを読み込んだ際の処理を修正
    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                // キャンバスの物理サイズを画像の解像度に合わせる（これが重要）
                baseLayer.width = img.width;
                baseLayer.height = img.height;
                frontLayer.width = img.width;
                frontLayer.height = img.height;
                
                // キャンバスラッパーの高さを動的に確保
                document.getElementById('canvas-wrapper').style.minHeight = (img.height * (frontLayer.clientWidth / img.width)) + 'px';
                
                baseLayer.getContext('2d').drawImage(img, 0, 0);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 以下、描画・制御ロジック
    let mode = 'arrow', history = [], isDragging = false, startX, startY;
    const baseCtx = baseLayer.getContext('2d'), frontCtx = frontLayer.getContext('2d'), previewCtx = previewCanvas.getContext('2d');

    function getPos(e) {
        const rect = frontLayer.getBoundingClientRect();
        return { x: (e.clientX - rect.left) * (baseLayer.width / rect.width), y: (e.clientY - rect.top) * (baseLayer.height / rect.height) };
    }

    function drawNaturalText(text, x, y, ctx, color) {
        ctx.font = '900 80px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'white'; const offset = 5;
        for (let dx = -offset; dx <= offset; dx += 2.5) for (let dy = -offset; dy <= offset; dy += 2.5) ctx.fillText(text, x + dx, y + dy);
        ctx.fillStyle = color; ctx.fillText(text, x, y);
    }

    function drawArrow(x1, y1, x2, y2, ctx, color) {
        const dx = x2 - x1, dy = y2 - y1, dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 10) return;
        const scale = Math.min(Math.max(dist / 200, 0.5), 2.0);
        const head = 60 * scale, width = 50 * scale, neck = 10 * scale, angle = Math.atan2(dy, dx);
        const nx = x2 - head * Math.cos(angle), ny = y2 - head * Math.sin(angle);
        const build = (c) => { c.beginPath(); c.moveTo(x1, y1); c.lineTo(nx+(neck/2)*Math.cos(angle-Math.PI/2), ny+(neck/2)*Math.sin(angle-Math.PI/2)); c.lineTo(nx+(width/2)*Math.cos(angle-Math.PI/2), ny+(width/2)*Math.sin(angle-Math.PI/2)); c.lineTo(x2, y2); c.lineTo(nx+(width/2)*Math.cos(angle+Math.PI/2), ny+(width/2)*Math.sin(angle+Math.PI/2)); c.lineTo(nx+(neck/2)*Math.cos(angle+Math.PI/2), ny+(neck/2)*Math.sin(angle+Math.PI/2)); c.closePath(); };
        ctx.strokeStyle = 'white'; ctx.lineWidth = 12; ctx.lineJoin = 'round'; build(ctx); ctx.stroke();
        ctx.fillStyle = color; build(ctx); ctx.fill();
    }

    function setMode(m) { mode = m; }
    function undo() { if (history.length === 0) return; const img = new Image(); img.onload = () => { baseCtx.clearRect(0,0,baseLayer.width,baseLayer.height); baseCtx.drawImage(img,0,0); }; img.src = history.pop(); }
    
    frontLayer.addEventListener('pointerdown', e => {
        frontLayer.setPointerCapture(e.pointerId);
        const pos = getPos(e); startX = pos.x; startY = pos.y; isDragging = true;
        if (mode === 'text') { history.push(baseLayer.toDataURL()); drawNaturalText(document.getElementById('textInput').value, startX, startY, baseCtx, colorPicker.value); isDragging = false; }
    });
    frontLayer.addEventListener('pointermove', e => {
        if (!isDragging || mode !== 'arrow') return;
        const pos = getPos(e); frontCtx.clearRect(0,0,frontLayer.width,frontLayer.height); drawArrow(startX, startY, pos.x, pos.y, frontCtx, colorPicker.value);
    });
    frontLayer.addEventListener('pointerup', e => {
        if (isDragging && mode === 'arrow') { history.push(baseLayer.toDataURL()); const pos = getPos(e); drawArrow(startX, startY, pos.x, pos.y, baseCtx, colorPicker.value); frontCtx.clearRect(0,0,frontLayer.width,frontLayer.height); }
        isDragging = false;
    });
    frontLayer.addEventListener('pointercancel', e => {
        isDragging = false;
        frontCtx.clearRect(0,0,frontLayer.width,frontLayer.height);
    });
    function showSavePreview() { previewCanvas.width = baseLayer.width; previewCanvas.height = baseLayer.height; previewCtx.drawImage(baseLayer, 0, 0); previewCtx.drawImage(frontLayer, 0, 0); document.getElementById('saveArea').style.display = 'block'; }
    function openInNewTab() { const win = window.open(); if(win) win.document.write('<img src="' + previewCanvas.toDataURL() + '"/>'); }
</script>
</body>
</html>
