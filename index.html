<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="A retro Windows 95 style image editor for drawing arrows and text.">
    <title>choi-draw</title>

    <!-- Open Graph Protocol (OGP) -->
    <meta property="og:title" content="choi-draw">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://inajob.github.io/choi-draw/">
    <meta property="og:image" content="https://inajob.github.io/choi-draw/ogp.png">
    <meta property="og:description" content="A simple image editor for drawing arrows and text.">
    <meta property="og:site_name" content="choi-draw">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="choi-draw">
    <meta name="twitter:description" content="A simple image editor for drawing arrows and text.">
    <meta name="twitter:image" content="https://inajob.github.io/choi-draw/ogp.png">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #008080; font-family: 'Courier New', Courier, monospace; font-size: 13px; padding: 10px; color: #000; margin: 0; }
        .window { background-color: #c0c0c0; border: 2px solid #000; padding: 2px; width: 100%; max-width: 600px; margin: auto; }
        .title-bar { background: #000080; color: #fff; padding: 3px 5px; font-weight: bold; margin-bottom: 2px; }
        .panel { border: 2px solid #000; background-color: #c0c0c0; padding: 8px; margin-bottom: 10px; box-shadow: inset 2px 2px #fff, inset -2px -2px #808080; }
        button {
            font-family: inherit;
            font-size: 12px;
            background-color: #c0c0c0;
            border: 2px solid #000;
            padding: 0 10px;
            height: 26px;
            box-sizing: border-box;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 2px 2px #fff, -2px -2px #808080;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
        }
        button:active { box-shadow: inset 2px 2px #000; }
        button.active { box-shadow: inset 2px 2px #808080, inset -2px -2px #fff; background-color: #dbdbdb; }
        #canvas-wrapper { position: relative; border: 2px solid #000; background-color: #808080; width: 100%; overflow: hidden; min-height: 100px; }
        .layer { position: absolute; top: 0; left: 0; width: 100%; display: block; touch-action: none; }
        input { border: 2px solid #000; box-shadow: inset 2px 2px #808080; padding: 2px; }
        .status-bar { display: flex; gap: 4px; margin-top: 10px; font-size: 11px; }
        .status-pane { border: 2px solid #000; box-shadow: inset 2px 2px #808080, inset -2px -2px #fff; padding: 3px 6px; }
        .status-pane a { color: #000080; font-weight: bold; text-decoration: underline; }
        .color-square {
            width: 16px;
            height: 16px;
            border: 1px solid #000;
            box-shadow: inset 1px 1px #fff, inset -1px -1px #808080;
            cursor: pointer;
            box-sizing: border-box;
        }
        .color-square:active, .color-square.selected {
            box-shadow: inset 1px 1px #808080, inset -1px -1px #fff;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">choi-draw.exe</div>
    <div class="content" style="padding: 10px;">
        <div class="panel" style="margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
            <span>Select Image:</span>
            <input type="file" id="fileInput" accept="image/*" style="font-size: 11px;">
        </div>

        <div class="panel" style="margin-bottom: 8px; display: flex; align-items: center; gap: 8px;">
            <span>Color:</span>
            <div class="color-selector" style="display: inline-flex; align-items: center; gap: 6px;">
                <div class="current-color-box" id="currentColorBox" style="width: 18px; height: 18px; border: 2px solid #000; box-shadow: inset 1px 1px #808080, inset -1px -1px #fff; background-color: #ff0000;"></div>
                <div style="display: grid; grid-template-columns: repeat(8, 16px); gap: 2px;">
                    <div class="color-square" style="background-color: #000000;" onclick="selectColor('#000000', this)"></div>
                    <div class="color-square" style="background-color: #808080;" onclick="selectColor('#808080', this)"></div>
                    <div class="color-square" style="background-color: #800000;" onclick="selectColor('#800000', this)"></div>
                    <div class="color-square" style="background-color: #808000;" onclick="selectColor('#808000', this)"></div>
                    <div class="color-square" style="background-color: #008000;" onclick="selectColor('#008000', this)"></div>
                    <div class="color-square" style="background-color: #008080;" onclick="selectColor('#008080', this)"></div>
                    <div class="color-square" style="background-color: #000080;" onclick="selectColor('#000080', this)"></div>
                    <div class="color-square" style="background-color: #800080;" onclick="selectColor('#800080', this)"></div>
                    
                    <div class="color-square" style="background-color: #ffffff;" onclick="selectColor('#ffffff', this)"></div>
                    <div class="color-square" style="background-color: #c0c0c0;" onclick="selectColor('#c0c0c0', this)"></div>
                    <div class="color-square selected" style="background-color: #ff0000;" onclick="selectColor('#ff0000', this)"></div>
                    <div class="color-square" style="background-color: #ffff00;" onclick="selectColor('#ffff00', this)"></div>
                    <div class="color-square" style="background-color: #00ff00;" onclick="selectColor('#00ff00', this)"></div>
                    <div class="color-square" style="background-color: #00ffff;" onclick="selectColor('#00ffff', this)"></div>
                    <div class="color-square" style="background-color: #0000ff;" onclick="selectColor('#0000ff', this)"></div>
                    <div class="color-square" style="background-color: #ff00ff;" onclick="selectColor('#ff00ff', this)"></div>
                </div>
            </div>
        </div>
        
        <div style="margin-bottom: 10px;">
            <button id="btnText" onclick="setMode('text')">Text</button>
            <button id="btnArrow" class="active" onclick="setMode('arrow')">Arrow</button>
            <button onclick="undo()">Undo</button>
            <button onclick="showSavePreview()">Save</button>
        </div>
        
        <div id="textInputContainer" style="display: none; margin-bottom: 10px;">
            <input type="text" id="textInput" placeholder="Type text here..." style="width: 100%; box-sizing: border-box; padding: 4px 6px; font-family: inherit; font-size: inherit;">
        </div>

        <div id="canvas-wrapper">
            <canvas id="baseLayer" class="layer"></canvas>
            <canvas id="frontLayer" class="layer"></canvas>
        </div>

        <div id="saveArea" style="display:none; margin-top:10px;">
            <canvas id="previewCanvas" style="width:100%; border: 2px solid #000;"></canvas>
            <button onclick="openInNewTab()" style="width:100%; margin-top:5px;">Open in New Tab</button>
        </div>
        
        <div class="status-bar">
            <div class="status-pane" style="flex-grow: 1;">
                Created by <a href="https://inajob.github.io/intro/index.html" target="_blank">inajob</a>
            </div>
            <div class="status-pane" style="width: 60px; text-align: center;">
                Ready
            </div>
        </div>
    </div>
</div>

<script>
    const baseLayer = document.getElementById('baseLayer'), frontLayer = document.getElementById('frontLayer');
    const previewCanvas = document.getElementById('previewCanvas');
    let currentColor = '#ff0000';
    function selectColor(color, el) {
        currentColor = color;
        document.getElementById('currentColorBox').style.backgroundColor = color;
        document.querySelectorAll('.color-square').forEach(sq => sq.classList.remove('selected'));
        if (el) el.classList.add('selected');
    }
    
    // 画像ファイルを読み込んだ際の処理を修正
    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                // キャンバスの物理サイズを画像の解像度に合わせる（これが重要）
                baseLayer.width = img.width;
                baseLayer.height = img.height;
                frontLayer.width = img.width;
                frontLayer.height = img.height;
                
                // キャンバスラッパーの高さを動的に確保
                document.getElementById('canvas-wrapper').style.minHeight = (img.height * (frontLayer.clientWidth / img.width)) + 'px';
                
                baseLayer.getContext('2d').drawImage(img, 0, 0);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 以下、描画・制御ロジック
    let mode = 'arrow', history = [], isDragging = false, startX, startY;
    const baseCtx = baseLayer.getContext('2d'), frontCtx = frontLayer.getContext('2d'), previewCtx = previewCanvas.getContext('2d');

    function getPos(e) {
        const rect = frontLayer.getBoundingClientRect();
        return { x: (e.clientX - rect.left) * (baseLayer.width / rect.width), y: (e.clientY - rect.top) * (baseLayer.height / rect.height) };
    }

    function drawNaturalText(text, x, y, ctx, color) {
        ctx.font = '900 80px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'white'; const offset = 5;
        for (let dx = -offset; dx <= offset; dx += 2.5) for (let dy = -offset; dy <= offset; dy += 2.5) ctx.fillText(text, x + dx, y + dy);
        ctx.fillStyle = color; ctx.fillText(text, x, y);
    }

    function drawArrow(x1, y1, x2, y2, ctx, color) {
        const dx = x2 - x1, dy = y2 - y1, dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 10) return;
        const scale = Math.min(Math.max(dist / 200, 0.5), 2.0);
        const head = 60 * scale, width = 50 * scale, neck = 10 * scale, angle = Math.atan2(dy, dx);
        const nx = x2 - head * Math.cos(angle), ny = y2 - head * Math.sin(angle);
        const build = (c) => { c.beginPath(); c.moveTo(x1, y1); c.lineTo(nx+(neck/2)*Math.cos(angle-Math.PI/2), ny+(neck/2)*Math.sin(angle-Math.PI/2)); c.lineTo(nx+(width/2)*Math.cos(angle-Math.PI/2), ny+(width/2)*Math.sin(angle-Math.PI/2)); c.lineTo(x2, y2); c.lineTo(nx+(width/2)*Math.cos(angle+Math.PI/2), ny+(width/2)*Math.sin(angle+Math.PI/2)); c.lineTo(nx+(neck/2)*Math.cos(angle+Math.PI/2), ny+(neck/2)*Math.sin(angle+Math.PI/2)); c.closePath(); };
        ctx.strokeStyle = 'white'; ctx.lineWidth = 12; ctx.lineJoin = 'round'; build(ctx); ctx.stroke();
        ctx.fillStyle = color; build(ctx); ctx.fill();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnText').classList.toggle('active', m === 'text');
        document.getElementById('btnArrow').classList.toggle('active', m === 'arrow');
        const container = document.getElementById('textInputContainer');
        container.style.display = m === 'text' ? 'block' : 'none';
        if (m === 'text') {
            document.getElementById('textInput').focus();
        }
    }
    function undo() { if (history.length === 0) return; const img = new Image(); img.onload = () => { baseCtx.clearRect(0,0,baseLayer.width,baseLayer.height); baseCtx.drawImage(img,0,0); }; img.src = history.pop(); }
    
    frontLayer.addEventListener('pointerdown', e => {
        frontLayer.setPointerCapture(e.pointerId);
        const pos = getPos(e); startX = pos.x; startY = pos.y; isDragging = true;
        if (mode === 'text') {
            frontCtx.clearRect(0, 0, frontLayer.width, frontLayer.height);
            drawNaturalText(document.getElementById('textInput').value, startX, startY, frontCtx, currentColor);
        }
    });
    frontLayer.addEventListener('pointermove', e => {
        if (!isDragging) return;
        const pos = getPos(e);
        if (mode === 'arrow') {
            frontCtx.clearRect(0, 0, frontLayer.width, frontLayer.height);
            drawArrow(startX, startY, pos.x, pos.y, frontCtx, currentColor);
        } else if (mode === 'text') {
            frontCtx.clearRect(0, 0, frontLayer.width, frontLayer.height);
            drawNaturalText(document.getElementById('textInput').value, pos.x, pos.y, frontCtx, currentColor);
        }
    });
    frontLayer.addEventListener('pointerup', e => {
        if (isDragging) {
            const pos = getPos(e);
            if (mode === 'arrow') {
                history.push(baseLayer.toDataURL());
                drawArrow(startX, startY, pos.x, pos.y, baseCtx, currentColor);
            } else if (mode === 'text') {
                history.push(baseLayer.toDataURL());
                drawNaturalText(document.getElementById('textInput').value, pos.x, pos.y, baseCtx, currentColor);
            }
            frontCtx.clearRect(0, 0, frontLayer.width, frontLayer.height);
        }
        isDragging = false;
    });
    frontLayer.addEventListener('pointercancel', e => {
        isDragging = false;
        frontCtx.clearRect(0, 0, frontLayer.width, frontLayer.height);
    });
    function showSavePreview() { previewCanvas.width = baseLayer.width; previewCanvas.height = baseLayer.height; previewCtx.drawImage(baseLayer, 0, 0); previewCtx.drawImage(frontLayer, 0, 0); document.getElementById('saveArea').style.display = 'block'; }
    function openInNewTab() { const win = window.open(); if(win) win.document.write('<img src="' + previewCanvas.toDataURL() + '"/>'); }
</script>
</body>
</html>
